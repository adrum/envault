name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, gd, intl, pdo_sqlite, redis, sodium, zip
          coverage: none

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Composer dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress
          --prefer-dist

      - name: Generate key
        run: php artisan key:generate

      - name: Configure directory permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Wayfinder + TypeScript definitions
        run: composer run type-gen

      - name: Run frontend tests (tsc + lint)
        run: pnpm run test

      - name: Execute tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test --compact
